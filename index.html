<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://cdn.emailjs.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*; connect-src 'self' https://firestore.googleapis.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com; frame-ancestors 'self';">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <title>GlobalShip Logistics - Home</title>
    <script src="https://cdn.emailjs.com/dist/email.min.js" integrity="sha512-7rAQqU+LkfqOx9F2YzOOg8ovWzGWjWUMxy+TlpIP/u7S5q7S0pwrWgaHAbPF0Jzh95TPykuKN3zNT02krrDbaA==" crossorigin="anonymous"></script>
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; color:#333; }
        header { background:#007bff; color:white; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
        .auth-buttons button { margin-left:10px; padding:8px 16px; border:none; border-radius:4px; cursor:pointer; }
        .hero { text-align:center; padding:60px 20px; background:#fff; box-shadow:0 0 10px rgba(0,0,0,0.1); position:relative; overflow:hidden; }
        .hero img { width:280px; height:auto; margin:15px; border-radius:8px; box-shadow:0 4px 15px rgba(0,0,0,0.2); animation:slideInLeft 1.2s ease-out forwards, ripple 2s ease-in-out infinite; opacity:0; }
        @keyframes slideInLeft { from { transform:translateX(-100px); opacity:0; } to { transform:translateX(0); opacity:1; } }
        @keyframes ripple { 0% { box-shadow:0 0 0 0 rgba(0,123,255,0.4); } 70% { box-shadow:0 0 0 20px rgba(0,123,255,0); } 100% { box-shadow:0 0 0 0 rgba(0,123,255,0); } }
        #tracking-form, #pricing { margin:20px auto; max-width:400px; padding:20px; background:white; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
        input, button, select { display:block; width:100%; margin:10px 0; padding:12px; box-sizing:border-box; border-radius:6px; }
        button { background:#007bff; color:white; border:none; cursor:pointer; transition:background 0.3s; }
        button:hover { background:#0056b3; }
        #pricing-result { margin-top:15px; padding:15px; background:#f0f0f0; border-radius:5px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:25px; border-radius:12px; width:90%; max-width:460px; }
        .dashboard-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:15px; margin-top:20px; }
        .dashboard-btn { background:#007bff; color:white; border:none; padding:20px; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.3s; box-shadow:0 4px 12px rgba(0,123,255,0.3); }
        .dashboard-btn:hover { background:#0056b3; transform:translateY(-4px); }
        .notification { padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:8px; background:#f8f9fa; }
    </style>
</head>
<body>
    <header>
        <h1>GlobalShip Logistics</h1>
        <div class="auth-buttons">
            <button id="signup-btn">Sign Up</button>
            <button id="login-btn">Login</button>
        </div>
    </header>

    <!-- Public Content -->
    <section id="public-content">
        <section class="hero">
            <h2>Welcome to GlobalShip</h2>
            <p>We deliver worldwide with trucks and planes.</p>
            <img src="https://firstduemovers.com/wp-content/uploads/2023/01/DtC-image.jpg" alt="Delivery Truck" style="animation-delay:0.2s;">
            <img src="https://truckfirstclass.com/wp-content/uploads/2022/09/full-truckload-ftl.png" alt="Delivery Truck" style="animation-delay:0.5s;">
            <img src="https://globalcorporatelogistics.com/wp-content/uploads/2024/08/Global-Corporate-Logistics-Airfreight-scaled.jpg" alt="Cargo Plane" style="animation-delay:0.8s;">
        </section>

        <!-- Your existing tracking, pricing, why-choose-us, about, reviews, live-comments, contact sections remain here -->
        <!-- (I kept them exactly as in the previous version to save space – they are unchanged) -->
        <!-- ... [same as last version] ... -->
    </section>

    <!-- Dashboard -->
    <div id="user-dashboard" style="display:none; margin:30px auto; max-width:900px; padding:30px; background:white; border-radius:12px; box-shadow:0 0 15px rgba(0,0,0,0.1);">
        <h2>Welcome, <span id="user-name"></span></h2>

        <!-- Shipment Notifications -->
        <div id="notifications-section">
            <h3>Shipment Notifications</h3>
            <div id="notifications-list"></div>
        </div>

        <div class="dashboard-grid">
            <button class="dashboard-btn" onclick="createShipment()">📦 Create Shipment / Label</button>
            <button class="dashboard-btn" onclick="manageShipments()">📋 Manage My Shipments</button>
            <button class="dashboard-btn" onclick="checkoutPayment()">💳 Checkout &amp; Pay</button>
            <button class="dashboard-btn" onclick="logoutUser()" style="background:#dc3545;">🚪 Logout</button>
        </div>
    </div>

    <!-- Create Shipment Modal -->
    <div id="create-shipment-modal" class="modal">
        <div class="modal-content">
            <h2>Create New Shipment</h2>
            <input type="text" id="item-name" placeholder="Item / Commodity Name" required>
            <input type="number" id="shipment-weight" placeholder="Weight (kg)" min="0.1" step="0.1" required>
            <input type="text" id="from-address" placeholder="From Address" required>
            <input type="text" id="from-zip" placeholder="From ZIP Code" required>
            <input type="text" id="to-address" placeholder="To Address" required>
            <input type="text" id="to-zip" placeholder="To ZIP Code" required>
            <button onclick="saveShipment()">Create &amp; Generate Tracking</button>
            <button onclick="document.getElementById('create-shipment-modal').style.display='none'">Cancel</button>
        </div>
    </div>

    <!-- Manage Shipments Modal -->
    <div id="manage-modal" class="modal">
        <div class="modal-content">
            <h2>My Shipments</h2>
            <div id="my-shipments-list"></div>
            <button onclick="document.getElementById('manage-modal').style.display='none'">Close</button>
        </div>
    </div>

    <!-- Checkout / Payment Modal -->
    <div id="payment-modal" class="modal">
        <div class="modal-content">
            <h2>Checkout &amp; Pay</h2>
            <p><strong>Total: $<span id="payment-amount">45.50</span></strong></p>
            <input type="text" id="card-number" placeholder="4242 4242 4242 4242" maxlength="19">
            <div style="display:flex; gap:10px;">
                <input type="text" id="expiry" placeholder="MM/YY" style="width:50%;">
                <input type="text" id="cvv" placeholder="CVV" maxlength="4" style="width:50%;">
            </div>
            <button onclick="processPayment()">Pay Securely</button>
            <button onclick="document.getElementById('payment-modal').style.display='none'">Cancel</button>
            <small style="color:#28a745;">Demo – No real money is charged</small>
        </div>
    </div>

    <!-- Sign Up & Login Modals (same as before) -->
    <!-- ... [your existing signup-modal and login-modal] ... -->

    <footer><p>&copy; 2026 GlobalShip Logistics</p></footer>

    <script type="module">
        // === Firebase imports and config (same as before) ===
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc, collection, query, where } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

        const firebaseConfig = { /* your config */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // Auth state
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const publicContent = document.getElementById('public-content');
            const dashboard = document.getElementById('user-dashboard');
            const signupBtn = document.getElementById('signup-btn');
            const loginBtn = document.getElementById('login-btn');

            if (user) {
                publicContent.style.display = 'none';
                signupBtn.style.display = 'none';
                loginBtn.style.display = 'none';
                dashboard.style.display = 'block';
                document.getElementById('user-name').textContent = user.email.split('@')[0];
                loadNotifications();
            } else {
                publicContent.style.display = 'block';
                signupBtn.style.display = 'inline-block';
                loginBtn.style.display = 'inline-block';
                dashboard.style.display = 'none';
            }
        });

        // === NEW: Create Shipment ===
        window.createShipment = () => {
            document.getElementById('create-shipment-modal').style.display = 'flex';
        };

        window.saveShipment = async () => {
            const itemName = document.getElementById('item-name').value;
            const weight = parseFloat(document.getElementById('shipment-weight').value);
            const from = document.getElementById('from-address').value;
            const fromZip = document.getElementById('from-zip').value;
            const to = document.getElementById('to-address').value;
            const toZip = document.getElementById('to-zip').value;

            const trackingNumber = 'GS' + Math.random().toString(36).substr(2,9).toUpperCase();

            try {
                await setDoc(doc(db, 'shipments', trackingNumber), {
                    userId: currentUser.uid,
                    itemName,
                    weight,
                    from: `${from} ${fromZip}`,
                    to: `${to} ${toZip}`,
                    status: 'Pending',
                    locationHistory: [`Order created - ${new Date().toLocaleString()}`]
                });
                alert(`Shipment created! Tracking number: ${trackingNumber}`);
                document.getElementById('create-shipment-modal').style.display = 'none';
            } catch (e) {
                alert('Error: ' + e.message);
            }
        };

        // === NEW: Manage My Shipments ===
        window.manageShipments = () => {
            const modal = document.getElementById('manage-modal');
            const list = document.getElementById('my-shipments-list');
            list.innerHTML = '<p>Loading...</p>';
            modal.style.display = 'flex';

            onSnapshot(collection(db, 'shipments'), (snapshot) => {
                list.innerHTML = '';
                let hasAny = false;
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    if (data.userId === currentUser.uid) {
                        hasAny = true;
                        const div = document.createElement('div');
                        div.className = 'notification';
                        div.innerHTML = `<strong>${docSnap.id}</strong> – ${data.itemName}<br>Status: <span style="color:#007bff">${data.status}</span>`;
                        list.appendChild(div);
                    }
                });
                if (!hasAny) list.innerHTML = '<p>No shipments yet. <button onclick="createShipment()">Create one now</button></p>';
            });
        };

        // === NEW: Checkout & Payment ===
        window.checkoutPayment = () => {
            document.getElementById('payment-modal').style.display = 'flex';
        };

        window.processPayment = () => {
            alert('✅ Payment successful! Receipt sent to your email.');
            document.getElementById('payment-modal').style.display = 'none';
        };

        // === NEW: Real-time Notifications ===
        function loadNotifications() {
            const container = document.getElementById('notifications-list');
            onSnapshot(collection(db, 'shipments'), (snapshot) => {
                container.innerHTML = '';
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    if (data.userId === currentUser.uid) {
                        const div = document.createElement('div');
                        div.className = 'notification';
                        div.innerHTML = `<strong>${docSnap.id}</strong> – ${data.itemName || 'Shipment'}<br>Status: <span style="color:#007bff">${data.status}</span><br>Last update: ${data.locationHistory ? data.locationHistory[data.locationHistory.length-1] : '—'}`;
                        container.appendChild(div);
                    }
                });
                if (container.innerHTML === '') container.innerHTML = '<p>No notifications yet.</p>';
            });
        }

        // Logout
        function logoutUser() {
            signOut(auth);
        }

        // Rest of your script (tracking, pricing, auth modals, etc.) remains the same as previous version
        // ... (I kept all previous working code intact) ...
    </script>
</body>
</html>
